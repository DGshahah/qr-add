<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR 생성기</title>

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">

<style>
body{font-family:-apple-system;background:#f2f2f7;text-align:center;padding:20px;}
.card{background:#fff;padding:20px;border-radius:15px;margin-bottom:20px;}
input{width:90%;padding:12px;border-radius:10px;border:1px solid #ccc;}
button{width:90%;padding:12px;margin-top:10px;border:none;border-radius:10px;color:white;}
.generate{background:#007AFF;}
.download{background:#34C759;}
</style>
</head>

<body>

<h2>QR 생성기</h2>

<div class="card">
<input id="text" placeholder="내용 입력">
<button class="generate" onclick="gen()">QR 생성</button>
</div>

<div class="card">
<canvas id="qr"></canvas>
<button class="download" onclick="down()">저장</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<script>
const canvas=document.getElementById('qr');

function gen(){
let t=document.getElementById('text').value;
if(!t){alert("입력하세요");return;}
QRCode.toCanvas(canvas,t,{width:220});
}

function down(){
let link=document.createElement('a');
link.download='qr.png';
link.href=canvas.toDataURL();
link.click();
}

if('serviceWorker'in navigator){
navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
